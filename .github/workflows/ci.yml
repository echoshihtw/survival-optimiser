name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.41.7'
  JAVA_VERSION: '17'

jobs:
  # ============================================================
  # QUALITY — runs on every push/PR
  # ============================================================
  quality:
    name: Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Setup Dart pub cache
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Install Melos
        run: dart pub global activate melos

      - name: Bootstrap
        run: melos bootstrap

      - name: Code generation
        run: melos run gen

      - name: Analyze — domain
        run: cd packages/domain && dart analyze --fatal-infos

      - name: Analyze — data
        run: cd packages/data && flutter analyze --fatal-infos

      - name: Analyze — application
        run: cd packages/application && flutter analyze --fatal-infos

      - name: Analyze — design_system
        run: cd packages/design_system && flutter analyze --fatal-infos

      - name: Analyze — presentation
        run: cd packages/presentation && flutter analyze --fatal-infos

      - name: Analyze — app
        run: cd app && flutter analyze --fatal-infos

      - name: Test — domain
        run: cd packages/domain && dart test --reporter=github

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: packages/domain/test-results/

  # ============================================================
  # BUILD iOS — runs on main/develop push only
  # ============================================================
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: quality
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install Melos
        run: dart pub global activate melos

      - name: Bootstrap
        run: melos bootstrap

      - name: Code generation
        run: melos run gen

      - name: Install CocoaPods
        run: gem install cocoapods

      - name: Pod install
        run: cd app/ios && pod install

      - name: Build iOS (no codesign)
        run: |
          cd app && flutter build ios \
            --release \
            --no-codesign \
            --dart-define=FLUTTER_BUILD_NUMBER=${{ github.run_number }}

      - name: Upload iOS build
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-${{ github.run_number }}
          path: app/build/ios/iphoneos/Runner.app
          retention-days: 7

  # ============================================================
  # BUILD Android — runs on main/develop push only
  # ============================================================
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install Melos
        run: dart pub global activate melos

      - name: Bootstrap
        run: melos bootstrap

      - name: Code generation
        run: melos run gen

      - name: Build Android APK
        run: |
          cd app && flutter build apk \
            --release \
            --dart-define=FLUTTER_BUILD_NUMBER=${{ github.run_number }}

      - name: Build Android AAB
        run: |
          cd app && flutter build appbundle \
            --release \
            --dart-define=FLUTTER_BUILD_NUMBER=${{ github.run_number }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.run_number }}
          path: app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-aab-${{ github.run_number }}
          path: app/build/app/outputs/bundle/release/app-release.aab
          retention-days: 7
